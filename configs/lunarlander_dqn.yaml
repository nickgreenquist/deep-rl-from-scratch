# Vanilla DQN on LunarLander-v3: first non-trivial env for the discrete
# track. 8-dim obs, 4 actions, shaped rewards (landing +100..140, crash
# -100, leg contact +10, fuel costs) — a much harder value function than
# CartPole's constant +1, hence the bigger net, bigger buffer, gentler lr,
# and longer epsilon anneal. "Solved" is commonly quoted as mean return
# >= 200. Toggles off: this is the vanilla baseline.
env_id: LunarLander-v3
seed: 0
total_steps: 300000
eval_every: 15000
eval_episodes: 20
run_name: lunarlander_dqn
device: cpu
logger: wandb
agent:
  algo: dqn
  hidden_sizes: [128, 128]
  lr: 5.0e-4
  gamma: 0.99
  buffer_capacity: 100000
  batch_size: 128
  learning_starts: 5000
  target_update_every: 1000  # gradient steps between hard target syncs
  epsilon_start: 1.0
  epsilon_end: 0.05
  epsilon_decay_steps: 100000
  double: false
  dueling: false
  n_step: 1

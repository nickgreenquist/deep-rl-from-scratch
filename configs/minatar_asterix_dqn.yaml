# Vanilla DQN on MinAtar/Asterix — Tier-1 benchmark game. Hyperparameters
# identical to minatar_breakout_dqn.yaml (the annotated reference config);
# only the env changes, matching the paper's one-setting-for-all-games setup.
env_id: MinAtar/Asterix-v0
seed: 0
total_steps: 5000000
eval_every: 100000
eval_episodes: 20
run_name: minatar_asterix_dqn
device: cpu
logger: wandb
agent:
  algo: dqn
  hidden_sizes: [128]  # post-conv FC sizes; the conv trunk is fixed at 16@3x3
  lr: 2.5e-4
  optimizer: adam
  gamma: 0.99
  buffer_capacity: 100000
  batch_size: 32
  learning_starts: 5000
  target_update_every: 1000  # gradient steps between hard target syncs
  epsilon_start: 1.0
  epsilon_end: 0.1
  epsilon_decay_steps: 100000
  double: false
  dueling: false
  n_step: 1

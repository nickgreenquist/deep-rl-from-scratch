# DQN proper on CartPole: the linear-Q on-ramp config with hidden layers.
# Same skeleton, same lr — where the linear net diverged at 1.0e-3, the
# [64, 64] net solves the env (eval 500). Vanilla DQN baseline: the
# double/dueling/n_step toggles stay off here so MinAtar ablations have a
# clean comparison point.
env_id: CartPole-v1
seed: 0
total_steps: 100000
eval_every: 5000
eval_episodes: 20
run_name: cartpole_dqn
device: cpu
logger: wandb
agent:
  algo: dqn
  hidden_sizes: [64, 64]
  lr: 1.0e-3
  gamma: 0.99
  buffer_capacity: 50000
  batch_size: 64
  learning_starts: 1000
  target_update_every: 500  # gradient steps between hard target syncs
  epsilon_start: 1.0
  epsilon_end: 0.05
  epsilon_decay_steps: 20000
  double: false
  dueling: false
  n_step: 1

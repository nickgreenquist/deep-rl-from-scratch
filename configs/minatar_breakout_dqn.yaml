# Vanilla DQN on MinAtar/Breakout — the discrete track's headline benchmark
# starts here. v0 = the paper setup: full shared 6-action set, sticky
# actions (p=0.1 the env repeats the previous action, so frame-perfect
# open-loop play is impossible and even deterministic-policy eval stays
# stochastic), difficulty ramping. Obs are 10x10x4 binary planes; the
# rank-3 obs space selects ConvQNet (paper net: Conv 16@3x3 -> FC 128)
# automatically. Hyperparameters match the paper's examples/dqn.py with one
# deviation: Adam instead of centered RMSprop (`optimizer: rmsprop` is
# wired in for the planned ablation). Reference curves are smoothed
# *training* return averaged over 30 seeds — compare rollout/episode_return,
# not eval/return_mean.
env_id: MinAtar/Breakout-v0
seed: 0
total_steps: 5000000
eval_every: 100000
eval_episodes: 20
run_name: minatar_breakout_dqn
device: cpu
logger: wandb
agent:
  algo: dqn
  hidden_sizes: [128]  # post-conv FC sizes; the conv trunk is fixed at 16@3x3
  lr: 2.5e-4
  optimizer: adam
  gamma: 0.99
  buffer_capacity: 100000
  batch_size: 32
  learning_starts: 5000
  target_update_every: 1000  # gradient steps between hard target syncs
  epsilon_start: 1.0
  epsilon_end: 0.1
  epsilon_decay_steps: 100000
  double: false
  dueling: false
  n_step: 1

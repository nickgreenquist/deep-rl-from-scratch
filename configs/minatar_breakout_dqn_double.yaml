# Tier-3 toggle ablation: minatar_breakout_dqn.yaml + Double DQN, all else
# identical. The candidate fix for the observed churn (best eval 25 at 1.9M
# vs final 10): overestimation-driven policy oscillation.
env_id: MinAtar/Breakout-v0
seed: 0
total_steps: 5000000
eval_every: 100000
eval_episodes: 20
run_name: minatar_breakout_dqn_double
device: cpu
logger: wandb
agent:
  algo: dqn
  hidden_sizes: [128]  # post-conv FC sizes; the conv trunk is fixed at 16@3x3
  lr: 2.5e-4
  optimizer: adam
  gamma: 0.99
  buffer_capacity: 100000
  batch_size: 32
  learning_starts: 5000
  target_update_every: 1000  # gradient steps between hard target syncs
  epsilon_start: 1.0
  epsilon_end: 0.1
  epsilon_decay_steps: 100000
  double: true
  dueling: false
  n_step: 1
